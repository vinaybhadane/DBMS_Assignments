<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBMS Practical Hub | Assignment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --card-hover: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f172a; /* Dark sleek background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(118, 75, 162, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(102, 126, 234, 0.15) 0, transparent 50%);
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card:hover {
            transform: translateY(-10px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
            gap: 10px;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .download-btn i {
            font-size: 1.1rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered animation for cards */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }

        footer {
            margin-top: 60px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>DBMS Practicals</h1>
        <p>DATABASE 5 to 10 PRACTICALS</p>
    </header>

    <div class="container" id="practical-grid">
        </div>

    <footer>
        &copy; 2026 DBMS Project | Designed for Excellence
    </footer>

    <script>
       const practicals = [
            { 
                id: 5, 
                title: "JOIN Operations and Views", 
                desc: "Perform various types of JOIN operations to extract meaningful relationships between tables. Create and manage different database views." 
            },
            { 
                id: 6, 
                title: "Subqueries", 
                desc: "Write and execute subqueries to retrieve data from one table based on results from another." 
            },
            { 
                id: 7, 
                title: "Stored Procedures or Function with Cursors", 
                desc: "Create and execute stored procedures / function using cursors." 
            },
            { 
                id: 8, 
                title: "Database Triggers", 
                desc: "Implement and test triggers to maintain data integrity in database." 
            },
            { 
                id: 9, 
                title: "CRUD Operations using MongoDB", 
                desc: "Design and implement basic Create, Read, Update, and Delete (CRUD) operations using MongoDB. Use the save method and logical operators where necessary." 
            },
            { 
                id: 10, 
                title: "Aggregation and Indexing in MongoDB", 
                desc: "Design and execute MongoDB queries using aggregation and indexing techniques with suitable examples." 
            }
        ];

        const grid = document.getElementById('practical-grid');

        practicals.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <div class="card-icon"><i class="fas fa-file-pdf"></i></div>
                    <h3>Practical No. ${p.id}</h3>
                    <p>${p.title}<br><small>${p.desc}</small></p>
                </div>
                <a href="DBMS_Practical_${p.id}.pdf" class="download-btn" download>
                    <i class="fas fa-cloud-download-alt"></i> Download PDF
                </a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
