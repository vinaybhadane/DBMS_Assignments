<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBMS Assignments | Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --accent: #60a5fa;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px; /* Prevents touching edges on mobile */
        }

        /* Animated Ambient Background */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(40%, 40%); }
        }

        /* Responsive Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
            
            h1 {
                font-size: 1.8rem !important;
            }

            p {
                font-size: 0.95rem !important;
            }
        }

        .db-icon {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            width: 70px;
            height: 70px;
            margin: 0 auto 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff 40%, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            max-width: 400px;
            margin: 0 auto 2.5rem;
        }

        /* Modern Loading Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--accent);
            animation: pulse-load 2s infinite ease-in-out;
        }

        @keyframes pulse-load {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 100px;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <main class="card">
        <div class="db-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
        </div>

        <div class="status-badge">Processing Uploads</div>
        
        <h1>DBMS ASSIGNMENTS</h1>
        
        <p>Our database lab resources are currently being synchronized. They will be uploaded here soon!</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div style="font-size: 0.7rem; color: #475569; letter-spacing: 1px;">
            SECURE ACCESS ONLY • 2026
        </div>
    </main>

</body>
</html>
